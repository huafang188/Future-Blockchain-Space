<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Blockchain Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #f4f7fa; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
        }
        .立体按钮 {
            box-shadow: 0 4px 0 #1e40af;
            transition: all 0.1s ease;
        }
        .立体按钮:active {
            box-shadow: 0 0 0 #1e40af;
            transform: translateY(4px);
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="pb-28">

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[999] hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h4 id="modalTitle" class="font-black text-slate-800 uppercase text-xs tracking-widest">Notice</h4>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-400">✕</button>
            </div>
            <div id="modalContent" class="p-8 text-sm text-slate-600"></div>
        </div>
    </div>

    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-slate-100 px-4 py-3">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="assets/head_logo.png" alt="Logo" class="w-8 h-8 object-contain">
                <h1 class="text-lg font-black text-slate-800">FBS</h1>
            </div>
            <select id="langSelect" onchange="if(typeof switchLang === 'function') switchLang(this.value)" class="bg-slate-100 border-none text-xs rounded-xl px-3 py-2 font-bold text-slate-700">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁体中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
            </select>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        
        <section class="glass-card rounded-[2.5rem] p-8 text-center border-b-2 border-blue-500/10">
            <div id="walletAddr" onclick="handleWalletClick()" class="cursor-pointer font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] border border-blue-100 mb-4 inline-block">
                Connect Wallet
            </div>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1" data-i18n="total_value">Total Value</p>
            <div class="text-4xl font-black text-slate-800 tracking-tighter">$ <span id="totalValue">0.00</span></div>
        </section>

        <section class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="p-5 border-b border-slate-100 font-black text-[10px] text-slate-400 uppercase tracking-widest bg-white/50" data-i18n="assets_list">Assets Overview</div>
            
            <div id="tokenRows" class="divide-y divide-slate-50 min-h-[60px]">
                </div>

            <div class="p-4 grid grid-cols-3 gap-3 bg-slate-50/50">
                <button onclick="openFinanceModal('recharge')" class="bg-white border border-slate-200 py-3 rounded-xl text-[11px] font-bold shadow-sm active:scale-95 transition-transform" data-i18n="recharge">充值</button>
                <button onclick="openFinanceModal('withdraw')" class="bg-white border border-slate-200 py-3 rounded-xl text-[11px] font-bold shadow-sm active:scale-95 transition-transform" data-i18n="withdraw">提币</button>
                <button onclick="openFinanceModal('exchange')" class="bg-white border border-slate-200 py-3 rounded-xl text-[11px] font-bold shadow-sm active:scale-95 transition-transform" data-i18n="exchange">兑换</button>
            </div>
        </section>

        <section class="glass-card rounded-[2.5rem] p-6 border-l-4 border-blue-600">
            <div class="flex gap-4 items-center mb-6">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-100">
                    <img src="assets/miner_logo.png" class="w-10 h-10 object-contain" alt="Miner">
                </div>
                <div>
                    <h3 class="font-black text-slate-800 text-sm italic uppercase" data-i18n="miner_name">FBS Miner S1</h3>
                    <span class="text-[10px] bg-emerald-100 text-emerald-600 font-black px-2 py-0.5 rounded uppercase">Active</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 bg-slate-50 rounded-2xl p-4 text-[11px] font-bold">
                <div class="flex flex-col"><span class="opacity-50 text-[9px]" data-i18n="m_count">数量</span><span id="miner_count" class="text-slate-900">0</span></div>
                <div class="flex flex-col"><span class="opacity-50 text-[9px]" data-i18n="m_yield">日产量</span><span id="miner_daily" class="text-slate-900">0.00</span></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button onclick="openMinerModal('buy')" class="立体按钮 bg-blue-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase" data-i18n="buy_miner">购买</button>
                <button onclick="openMinerModal('fee')" class="立体按钮 bg-slate-800 text-white py-4 rounded-2xl text-[10px] font-black uppercase" data-i18n="pay_fee">电费</button>
            </div>
        </section>

        <section class="glass-card rounded-[2.5rem] p-6 bg-slate-50/50">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-slate-800 text-xs uppercase" data-i18n="team_title">My Team</h3>
                <span class="text-[10px] font-black text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200">ID: <span id="info_inviteCode">---</span></span>
            </div>
            <div class="bg-white rounded-[2rem] p-6 grid grid-cols-2 gap-6 border border-slate-100">
                <div>
                    <p class="text-[9px] text-slate-400 font-black uppercase mb-1" data-i18n="direct_num">Direct Users</p>
                    <p class="text-xl font-black text-slate-900" id="team_directCount">0</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-black uppercase mb-1" data-i18n="direct_sales">Direct Sales</p>
                    <p class="text-xl font-black text-blue-600">$ <span id="team_directSales">0</span></p>
                </div>
                <div class="col-span-2 pt-4 border-t border-slate-50 text-center">
                    <p class="text-[9px] text-yellow-700 font-black uppercase mb-1" data-i18n="total_rewards">Total Rewards</p>
                    <p class="text-3xl font-black text-yellow-500" id="team_totalReward">$ 0.00</p>
                </div>
            </div>
            <div class="mt-4 flex justify-between px-2 text-[9px] text-slate-400 font-bold uppercase">
                <span>Inviter: <span id="info_inviter" class="text-slate-600">--</span></span>
                <span>Joined: <span id="info_regTime" class="text-slate-600">--</span></span>
            </div>
        </section>

        <section class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="p-5 border-b border-slate-100 font-black text-[10px] text-slate-400 uppercase tracking-widest bg-white/50" data-i18n="history_title">Transaction History</div>
            <div id="historyList" class="min-h-[100px] py-8 flex flex-col items-center justify-center text-[10px] text-slate-300 font-bold italic tracking-widest">
                NO RECORDS FOUND
            </div>
        </section>

    </main>

    <script src="languages.js"></script>
    <script src="app.js"></script>
</body>
</html>
