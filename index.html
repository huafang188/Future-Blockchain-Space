<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Blockchain Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d); /* 动感深色背景 */
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        /* 玻璃质感容器 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 1rem;
            transition: transform 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px); /* 微小浮动效果 */
        }
        /* 立体感按钮 */
        .btn-tech {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.3s;
        }
        .btn-tech:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen p-4">

    <header class="flex justify-between items-center max-w-5xl mx-auto py-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-xl shadow-lg">F</div>
            <h1 class="text-2xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                FUTURE BLOCKCHAIN SPACE
            </h1>
        </div>
        <div class="flex gap-2">
            <select id="langSwitch" class="bg-gray-800 text-sm border-none rounded px-2 py-1 outline-none glass-card">
                <option value="zh">简体中文</option>
                <option value="en">English</option>
                <option value="jp">日本語</option>
                <option value="ru">Русский</option>
            </select>
            <button onclick="connectWallet()" id="connectBtn" class="btn-tech px-4 py-1 rounded-full text-sm font-semibold">连接钱包</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto space-y-6 pb-20">

        <section id="userSection" class="hidden animate-pulse">
            <div class="glass-card p-6 text-center">
                <p class="text-gray-400 text-sm mb-1">当前钱包地址</p>
                <button onclick="toggleAddress()" id="walletAddr" class="text-lg font-mono hover:text-blue-300 transition cursor-pointer">
                    未连接
                </button>
                <div class="mt-6">
                    <p class="text-gray-400 text-sm">资产总价值 (Estimated Value)</p>
                    <h2 class="text-4xl font-bold mt-2">$ <span id="totalValue">0.00</span></h2>
                </div>
            </div>
        </section>

        <section class="grid md:grid-cols-2 gap-6">
            <div class="glass-card p-6 flex flex-col md:flex-row gap-6">
                <div class="w-full md:w-1/3 aspect-square bg-gray-700 rounded-lg flex items-center justify-center border-2 border-indigo-500/30">
                    <span class="text-xs text-gray-400">矿机图片预览</span>
                </div>
                <div class="flex-1 space-y-2">
                    <h3 class="text-xl font-bold border-b border-white/10 pb-2">矿机详情</h3>
                    <div class="grid grid-cols-2 text-sm">
                        <span class="text-gray-400">矿机数量:</span> <span id="mCount">0</span>
                        <span class="text-gray-400">日产量:</span> <span id="mYield">0.00 FBS</span>
                        <span class="text-gray-400">锁仓数量:</span> <span id="mLocked">0.00</span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="openModal('buy')" class="flex-1 py-2 rounded-lg bg-green-600 hover:bg-green-500 text-sm font-bold">购买矿机</button>
                        <button onclick="openModal('fee')" class="flex-1 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-sm font-bold">缴纳电费</button>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xl font-bold mb-4 border-b border-white/10 pb-2">我的团队</h3>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div class="bg-white/5 p-3 rounded">推荐人: <span id="inviter" class="block text-indigo-300">无</span></div>
                    <div class="bg-white/5 p-3 rounded">累计奖励: <span id="totalReward" class="block text-yellow-400">0.00 USDT</span></div>
                    <div class="bg-white/5 p-3 rounded">直推人数: <span id="directCount">0</span></div>
                    <div class="bg-white/5 p-3 rounded">团队人数: <span id="teamCount">0</span></div>
                </div>
            </div>
        </section>

        <section class="glass-card overflow-hidden">
            <div class="p-4 border-b border-white/10 font-bold">资产列表</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-gray-400">
                        <tr>
                            <th class="p-4">资产</th>
                            <th class="p-4 text-right">数量</th>
                            <th class="p-4 text-right">价格</th>
                            <th class="p-4 text-right">总额</th>
                        </tr>
                    </thead>
                    <tbody id="tokenList">
                        </tbody>
                </table>
            </div>
            <div class="p-4 flex gap-3 justify-center bg-white/5">
                <button class="px-6 py-2 rounded bg-indigo-600 text-sm">充值</button>
                <button class="px-6 py-2 rounded bg-purple-600 text-sm">提币</button>
                <button class="px-6 py-2 rounded bg-gray-600 text-sm">兑换</button>
            </div>
        </section>

        <section class="glass-card p-6">
            <h3 class="text-xl font-bold mb-4">交易历史</h3>
            <div id="historyList" class="text-center text-gray-500 text-sm py-10">
                暂无交易数据，连接钱包以查看
            </div>
        </section>
    </main>

    <script>
        // --- 核心 Web3 逻辑 ---
        let userAddress = "";
        let isFullAddress = false;

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    updateUI();
                } catch (err) {
                    console.error("连接失败", err);
                }
            } else {
                alert("请安装 Web3 钱包（如 Bitget 或 MetaMask）");
            }
        }

        function updateUI() {
            document.getElementById('userSection').classList.remove('hidden');
            document.getElementById('connectBtn').innerText = "已连接";
            renderAddress();
            // 这里应该调用你的 Cloudflare Worker API 来获取飞书里的真实数据
            // fetchUserDataFromFeishu(userAddress); 
        }

        function renderAddress() {
            const btn = document.getElementById('walletAddr');
            if (isFullAddress) {
                btn.innerText = userAddress;
            } else {
                // 显示前32位和后6位（根据你的要求）
                const start = userAddress.substring(0, 32);
                const end = userAddress.substring(userAddress.length - 6);
                btn.innerText = `${start}...${end}`;
            }
        }

        function toggleAddress() {
            isFullAddress = !isFullAddress;
            renderAddress();
        }

        // --- 模拟数据渲染 ---
        const tokens = ['FBS', 'FBST', 'FBSP', 'PBSU', 'USDT', 'BNB', 'BTC', 'ETH'];
        const listContainer = document.getElementById('tokenList');
        tokens.forEach(t => {
            listContainer.innerHTML += `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="p-4 font-bold">${t}</td>
                    <td class="p-4 text-right">0.00</td>
                    <td class="p-4 text-right font-mono">$0.00</td>
                    <td class="p-4 text-right font-bold">$0.00</td>
                </tr>
            `;
        });

        // --- 支付与签名逻辑思路 ---
        async function handlePayment(amount, type) {
            // 1. 发起签名请求确保安全
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const message = `确认支付 ${amount} USDT 用于 ${type}，操作时间: ${Date.now()}`;
            
            try {
                const signature = await signer.signMessage(message);
                // 2. 只有签名成功后，才调用转账合约
                // 3. 记录到飞书 (通过 fetch 调用你的 Worker)
                console.log("签名成功:", signature);
                alert("签名验证通过，正在唤起转账...");
            } catch (e) {
                alert("用户取消或验证失败");
            }
        }
    </script>
</body>
</html>
