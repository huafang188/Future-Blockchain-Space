<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Blockchain Space</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 logo-circle border border-slate-200">
                    <span class="text-blue-600 font-bold">FBS</span>
                </div>
                <h1 class="text-lg font-bold tracking-tight" data-i18n="title">Future Blockchain Space</h1>
            </div>
            <div class="flex items-center gap-2">
                <select onchange="changeLanguage(this.value)" class="bg-slate-100 text-xs rounded-full px-2 py-1 outline-none">
                    <option value="zh-CN">简体中文</option>
                    <option value="en">English</option>
                </select>
                <button onclick="connectWallet()" id="connectBtn" class="btn-primary text-xs font-semibold px-4 py-2 rounded-full shadow-lg" data-i18n="connect">连接钱包</button>
            </div>
        </div>
    </header>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center">
            <h4 id="modalTitle" class="font-bold text-slate-800">标题</h4>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div id="modalContent" class="p-6">
            </div>
    </div>
</div>
    
    <main class="max-w-5xl mx-auto p-4 space-y-6">
        <section class="section-card p-6 text-center">
            <button onclick="toggleAddress()" id="walletAddr" class="text-slate-400 font-mono text-sm hover:text-blue-600">未连接钱包</button>
            <div class="mt-8">
                <p class="text-slate-500 text-xs font-medium" data-i18n="total_value">总资产价值</p>
                <div class="text-4xl font-bold mt-1 text-slate-900">$ <span id="totalBalance">0.00</span></div>
            </div>
        </section>

        <section class="section-card p-5">
            <div class="flex items-start gap-4">
                <div class="miner-thumb flex items-center justify-center border border-slate-100 bg-slate-50 overflow-hidden">
                    <img id="minerImg" src="assets/miner.png" class="w-full h-full object-cover hidden">
                    <span class="text-[10px] text-slate-400">矿机图</span>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-sm" data-i18n="miner_title">我的矿机</h3>
                    <div class="grid grid-cols-2 gap-y-1 text-[11px] mt-2 text-slate-500">
                        <p>数量: <span class="text-slate-800 font-bold" id="mCount">0</span></p>
                        <p>日产量: <span class="text-slate-800 font-bold" id="mYield">0.00</span></p>
                        <p>期限: <span class="text-slate-800 font-bold" id="mTerm">--</span></p>
                        <p>锁仓: <span class="text-slate-800 font-bold" id="mLocked">0.00</span></p>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-5">
                <button class="bg-slate-900 text-white py-2 rounded-xl text-xs font-bold" data-i18n="buy_miner">购买矿机</button>
                <button class="bg-white border border-slate-200 py-2 rounded-xl text-xs font-bold" data-i18n="pay_fee">缴纳电费</button>
            </div>
        </section>

        <section class="section-card overflow-hidden">
            <div class="p-4 border-b border-slate-50 font-bold text-sm" data-i18n="assets_list">资产概览</div>
            <div id="tokenRows" class="divide-y divide-slate-50">
                </div>
            <div class="p-4 grid grid-cols-3 gap-2 bg-slate-50/50">
                <button class="py-2 rounded-lg bg-white border border-slate-200 text-xs font-bold" data-i18n="recharge">充值</button>
                <button class="py-2 rounded-lg bg-white border border-slate-200 text-xs font-bold" data-i18n="withdraw">提币</button>
                <button class="py-2 rounded-lg bg-white border border-slate-200 text-xs font-bold" data-i18n="exchange">兑换</button>
            </div>
        </section>

        <section class="section-card overflow-hidden">
            <div class="p-4 border-b border-slate-50 font-bold text-sm" data-i18n="history_title">交易历史</div>
            <div id="historyList" class="divide-y divide-slate-50 min-h-[100px] text-center py-10 text-slate-400 text-xs">
                连接钱包同步数据...
            </div>
        </section>
    </main>

    <script src="languages.js"></script>
    <script src="app.js"></script>
</body>
</html>
