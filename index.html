<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Blockchain Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #f8fafc; /* 极简浅灰白 */
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .section-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .logo-circle { border-radius: 50%; object-fit: cover; background: #f1f5f9; }
        .miner-img { border-radius: 1rem; object-fit: cover; background: #f1f5f9; width: 80px; height: 80px; }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 logo-circle border border-slate-200 flex items-center justify-center overflow-hidden">
                    <img src="YOUR_LOGO_URL" alt="Logo" class="w-full h-full hidden" onerror="this.classList.add('hidden')">
                    <span class="text-blue-600 font-bold">F</span>
                </div>
                <h1 class="text-lg font-bold tracking-tight text-slate-800">Future Blockchain Space</h1>
            </div>
            <div class="flex items-center gap-3">
                <select class="bg-slate-100 text-xs rounded-full px-3 py-1 border-none outline-none">
                    <option>简体中文</option><option>English</option><option>日本語</option>
                </select>
                <button onclick="connectWallet()" id="connectBtn" class="bg-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-full shadow-lg shadow-blue-200">连接钱包</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 space-y-6">
        
        <section id="userDisplay" class="section-card p-6 text-center">
            <p class="text-slate-500 text-xs font-medium uppercase tracking-wider">当前钱包</p>
            <button onclick="toggleAddress()" id="walletAddr" class="text-slate-800 font-mono text-sm mt-1 hover:text-blue-600 transition">未连接</button>
            
            <div class="mt-8 pt-6 border-t border-slate-50">
                <p class="text-slate-500 text-xs">总资产净值 (USD)</p>
                <div class="text-4xl font-bold text-slate-900 mt-1">$<span id="totalBalance">0.00</span></div>
            </div>
        </section>

        <section class="section-card p-5">
            <div class="flex items-start gap-4">
                <div class="miner-img flex-shrink-0 flex items-center justify-center border border-slate-100">
                    <span class="text-[10px] text-slate-400">矿机图</span>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-slate-800">我的矿机</h3>
                        <span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold">运行中</span>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2 text-xs">
                        <p class="text-slate-500">数量: <span class="text-slate-800 font-semibold ml-1">0 台</span></p>
                        <p class="text-slate-500">日产量: <span class="text-slate-800 font-semibold ml-1">0.00 FBS</span></p>
                        <p class="text-slate-500">周期: <span class="text-slate-800 font-semibold ml-1">-- 天</span></p>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-5">
                <button class="bg-slate-900 text-white py-2.5 rounded-xl text-sm font-bold active:scale-95 transition">购买矿机</button>
                <button class="bg-white border border-slate-200 text-slate-800 py-2.5 rounded-xl text-sm font-bold active:scale-95 transition">缴纳电费</button>
            </div>
        </section>

        <section class="section-card overflow-hidden">
            <div class="p-4 border-b border-slate-50 font-bold text-slate-800">资产概览</div>
            <div class="divide-y divide-slate-50" id="tokenRows">
                <script>
                    const tokens = [
                        {name: 'FBS', color: 'bg-blue-500'}, {name: 'FBST', color: 'bg-indigo-500'},
                        {name: 'FBSP', color: 'bg-purple-500'}, {name: 'PBSU', color: 'bg-cyan-500'},
                        {name: 'USDT', color: 'bg-green-500'}, {name: 'BNB', color: 'bg-yellow-500'},
                        {name: 'BTC', color: 'bg-orange-500'}, {name: 'ETH', color: 'bg-blue-700'}
                    ];
                    tokens.forEach(t => {
                        document.write(`
                            <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 logo-circle flex items-center justify-center text-[10px] text-white font-bold ${t.color}">
                                        ${t.name[0]}
                                    </div>
                                    <div>
                                        <div class="font-bold text-sm">${t.name}</div>
                                        <div class="text-[10px] text-slate-400">$0.00</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="font-bold text-sm text-slate-800">0.0000</div>
                                    <div class="text-[10px] text-slate-400">≈ $0.00</div>
                                </div>
                            </div>
                        `);
                    });
                </script>
            </div>
            <div class="p-4 grid grid-cols-3 gap-2 bg-slate-50/50">
                <button class="py-2 rounded-lg bg-white border border-slate-200 text-xs font-bold">充值</button>
                <button class="py-2 rounded-lg bg-white border border-slate-200 text-xs font-bold">提币</button>
                <button class="py-2 rounded-lg bg-white border border-slate-200 text-xs font-bold">兑换</button>
            </div>
        </section>

        </main>

    <script>
        // 核心：连接飞书数据的方法
        async function fetchFeishuData(address) {
            // 这里替换成你的 Cloudflare Worker 接口
            const WORKER_URL = 'https://your-worker.workers.dev/api/data';
            try {
                const res = await fetch(`${WORKER_URL}?address=${address}`);
                const data = await res.json();
                // 拿到数据后更新 UI
                document.getElementById('totalBalance').innerText = data.total_balance;
            } catch (e) {
                console.log("飞书数据读取失败，请检查 Worker 配置");
            }
        }
    </script>
</body>
</html>
