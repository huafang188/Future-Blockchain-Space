<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Blockchain Space</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="pb-28">
<div id="modalOverlay" class="fixed inset-0 bg-slate-900/10 backdrop-blur-md z-[999] hidden items-center justify-center p-4">
        <div class="modal-box"> 
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h4 id="modalTitle" class="font-black text-slate-800 uppercase text-xs tracking-widest">提示</h4>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400">✕</button>
            </div>
            <div id="modalContent" class="p-8 text-sm text-slate-600"></div>
        </div>
    </div>

    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-slate-100 px-4 py-3">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="assets/head_logo.png" 
                     alt="Logo" 
                     class="w-12 h-12 bg-white rounded-xl shadow-md border border-slate-100 object-contain p-1 flex-shrink-0">
                
                <div class="flex flex-col justify-center">
                    <h1 class="text-xl font-black text-slate-800 tracking-tighter leading-tight">FBS</h1>
                    <h2 data-i18n="title" class="text-[10px] font-bold text-blue-600 tracking-tight leading-tight uppercase">Future Blockchain Space</h2>
                </div>
            </div>

            <div class="bg-slate-100 rounded-xl px-1">
                <select id="langSelect" onchange="if(typeof switchLang === 'function') switchLang(this.value)" class="bg-transparent border-none text-xs px-3 py-2 font-bold text-slate-700 outline-none">
                    <option value="zh-CN">简体中文</option>
                    <option value="zh-HK">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="ru">Русский</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        
<section class="glass-card rounded-[2.5rem] p-8 text-center border-b-2 border-blue-500/10">
    <div id="walletAddr" data-i18n="connect" onclick="handleWalletClick()" class="cursor-pointer font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] border border-blue-100 mb-4 inline-block">
        连接钱包
    </div>
    
    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1" data-i18n="total_value">总资产价值</p>
    
    <div class="text-4xl font-black text-slate-800 tracking-tighter">
        $ <span id="totalValue">0.00</span>
    </div>
</section>

        <section class="glass-card rounded-[2.5rem] p-6 border-l-4 border-blue-600">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-black text-slate-800 text-xl uppercase tracking-widest" data-i18n="miner_title">我的矿机</h3>
                <span class="text-[10px] bg-emerald-100 text-emerald-600 font-black px-2 py-0.5 rounded uppercase">Running</span>
            </div>
            <div class="flex gap-4 items-center mb-6">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-100 overflow-hidden">
                    <img src="assets/miner_logo.png" class="w-full h-full object-cover" alt="Miner">
                </div>
                <div>
                    <h3 class="font-black text-slate-800 text-sm italic uppercase" data-i18n="miner_name">FBS Smart Miner S1</h3>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">高性能算力终端</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 bg-slate-50 rounded-2xl p-4 text-[11px] font-bold">
                <div class="flex flex-col"><span class="opacity-50 text-[9px]" data-i18n="m_count">矿机数量</span><span id="miner_count" class="text-slate-900 text-sm">0</span></div>
                <div class="flex flex-col"><span class="opacity-50 text-[9px]" data-i18n="m_yield">预估日产</span><span id="miner_daily" class="text-slate-900 text-sm">0.00</span></div>
                <div class="flex flex-col pt-2 border-t border-slate-200"><span class="opacity-50 text-[9px]" data-i18n="m_term">到期时间</span><span id="miner_deadline" class="text-slate-900 text-[10px]">--</span></div>
                <div class="flex flex-col pt-2 border-t border-slate-200"><span class="opacity-50 text-[9px]" data-i18n="m_locked">锁仓金额</span><span id="miner_locked" class="text-slate-900 text-sm">0.00</span></div>
            </div>
<div class="grid grid-cols-2 gap-4 mt-6 px-1">
    <button onclick="openMinerModal('buy')" class="action-btn w-full">
        <span data-i18n="buy_miner">购买矿机</span>
    </button>
    <button onclick="openMinerModal('fee')" class="action-btn w-full">
        <span data-i18n="pay_fee">缴纳电费</span>
    </button>
</div>
        </section>

        <section class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="p-5 border-b border-slate-100 font-black text-xl text-slate-400 uppercase tracking-widest bg-white/50" data-i18n="assets_list">资产预览</div>
            <div id="tokenRows" class="divide-y divide-slate-50 min-h-[40px]"></div>
        </section>

<div class="grid grid-cols-4 gap-3 mt-6 px-4">
    <button onclick="openFinanceModal('recharge')" class="action-btn">
        <span data-i18n="recharge">充值</span>
    </button>
    
    <button onclick="openFinanceModal('withdraw')" class="action-btn">
        <span data-i18n="withdraw">提币</span>
    </button>

    <button onclick="openFinanceModal('exchange')" class="action-btn">
        <span data-i18n="exchange">兑换</span>
    </button>

    <button onclick="openFinanceModal('transfer')" class="action-btn">
        <span data-i18n="transfer">转账</span>
    </button>
</div>

<section class="glass-card rounded-[2.5rem] p-6 bg-slate-50/50">
    <div class="flex justify-between items-center mb-4">
        <h3 class="font-black text-slate-800 text-xl uppercase" data-i18n="team_title">我的团队</h3>
        <span onclick="copyInviteCode()" 
              class="text-lg font-black text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200 cursor-pointer active:scale-95 transition-transform hover:bg-slate-50">
            ID: <span id="info_inviteCode">---</span>
        </span>
    </div>

            <div class="bg-white rounded-[2rem] p-6 space-y-4 border border-slate-100 shadow-sm">
                <div class="grid grid-cols-2 gap-4 pb-4 border-b border-slate-50">
                    <div>
                        <p class="text-sm text-slate-400 font-black uppercase mb-1" data-i18n="direct_num">直推人数</p>
                        <p class="text-xl font-black text-slate-900" id="team_directCount">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-400 font-black uppercase mb-1" data-i18n="direct_sales">直推业绩</p>
                        <p class="text-xl font-black text-blue-600">$ <span id="team_directSales">0.00</span></p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 pb-4 border-b border-slate-50">
                    <div>
                        <p class="text-sm text-slate-400 font-black uppercase mb-1" data-i18n="team_num">团队总人数</p>
                        <p class="text-xl font-black text-slate-900" id="team_totalCount">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-400 font-black uppercase mb-1" data-i18n="team_sales">团队总业绩</p>
                        <p class="text-xl font-black text-slate-800">$ <span id="team_totalSales">0.00</span></p>
                    </div>
                </div>
                <div class="pt-2 text-center">
                    <p class="text-lg text-yellow-700 font-black uppercase mb-1" data-i18n="total_rewards">累计奖励</p>
                    <p class="text-3xl font-black text-yellow-500" id="team_totalReward">$ 0.00</p>
                </div>
            </div>

<div class="mt-6 flex flex-col gap-2 px-2 text-base text-slate-400 font-bold">
    <div class="flex justify-between border-b border-slate-50 pb-2">
        <span>推荐人</span>
        <span id="info_inviter" class="text-slate-800">--</span>
    </div>
    <div class="flex justify-between">
        <span>注册时间</span>
        <span id="info_regTime" class="text-slate-800">--</span>
    </div>
</div>
        </section>

<section class="glass-card rounded-[2.5rem] p-6 space-y-4">
    <h3 class="font-black text-slate-800 text-sm px-2" data-i18n="history_title">交易历史</h3>
    <div id="historyList" class="space-y-2">
        <div class="p-10 text-center text-slate-300 text-xs" data-i18n="loading">加载中...</div>
    </div>
</section>

<section class="glass-card rounded-[2.5rem] p-6 space-y-4">
    <h3 class="font-black text-slate-800 text-sm px-2" data-i18n="transfer_title">转账流水</h3>
    <div id="transferList" class="space-y-2">
        <div class="p-10 text-center text-slate-300 text-xs" data-i18n="no_data">暂无数据</div>
    </div>
</section>

    </main>
    
    <script src="languages.js"></script>
    <script src="app.js"></script>
</body>
</html>
